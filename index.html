<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery &amp; Shop - Rony Bolivar Art</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>Rony Bolivar Art</h1>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery &amp; Shop</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" style="height: 40vh; background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('images/gallery-hero.jpg');">
        <div class="hero-content">
            <h2>Gallery &amp; Shop</h2>
            <p>Browse and purchase original digital art, high-res prints, and downloads.</p>
        </div>
    </section>

    <section class="shop">
        <h2>All Artworks</h2>
        <div class="grid" id="shop-grid">
            <!-- Art items populated by JS -->
        </div>
    </section>

    <div id="cart-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Your Cart</h2>
            <ul id="cart-items"></ul>
            <p>Total: $<span id="cart-total">0</span></p>
            <button onclick="checkout()">Checkout (PayPal/Stripe coming soon)</button>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Rony Bolivar Art. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
